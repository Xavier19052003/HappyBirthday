<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Kaitlynn 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: -webkit-fill-available;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #CDB4DB, #FFC8DD, #BDE0FE);
      background-size: 200% 200%;
      background-attachment: fixed;
      animation: gradientShift 10s ease infinite;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 60px 16px 40px;
      width: 100%;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .floating-item {
      position: fixed;
      opacity: 0;
      animation: floatUp linear infinite;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Centre the scene horizontally, push it down */
    .scene {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      /* extra top space for cat to peek into */
      padding-top: 60px;
    }

    /* Cat sits above envelope */
    .cat {
      position: absolute;
      font-size: 50px;
      left: 50%;
      top: 0;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
      pointer-events: none;
      z-index: 2;
      line-height: 1;
    }

    .envelope {
      position: relative;
      width: 100%;
      background: #7B2CBF;
      border-radius: 14px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.2);
      animation: wiggle 3s ease-in-out infinite;
      cursor: pointer;
      height: 200px;
      transition: height 0.7s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .envelope.is-open {
      animation: none;
      cursor: default;
      height: auto;
      min-height: 200px;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      5%, 15%  { transform: rotate(-2deg); }
      10%, 20% { transform: rotate(2deg); }
      25%      { transform: rotate(0deg); }
    }

    .flap {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 55%;
      background: #9D4EDD;
      clip-path: polygon(0 0, 50% 95%, 100% 0);
      border-radius: 14px 14px 0 0;
      transform-origin: top center;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 4;
    }

    .pocket {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #9D4EDD 0%, #7B2CBF 100%);
      clip-path: polygon(0 45%, 50% 68%, 100% 45%, 100% 100%, 0 100%);
      border-radius: 0 0 14px 14px;
      z-index: 5;
      pointer-events: none;
      transition: clip-path 0.5s ease, height 0.5s ease;
    }

    .seal {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 46px; height: 46px;
      background: #3c096c;
      border-radius: 50%;
      z-index: 6;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .letter {
      position: relative;
      margin: 10px 3% 0;
      width: 94%;
      max-height: 178px;
      overflow: hidden;
      background: #fffdf7;
      background-image: repeating-linear-gradient(transparent, transparent 24px, rgba(123,44,191,0.09) 25px);
      border-radius: 10px 10px 0 0;
      padding: 22px 20px 20px;
      text-align: center;
      z-index: 3;
      transition: max-height 0.7s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    /* Open states */
    .envelope.is-open .letter {
      max-height: 2000px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .envelope.is-open .flap {
      transform: rotateX(180deg);
      z-index: 1;
    }

    .envelope.is-open .seal {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.7);
    }

    .envelope.is-open .pocket {
      height: 14px;
      clip-path: polygon(0 0, 50% 60%, 100% 0, 100% 100%, 0 100%);
    }

    .envelope.is-open ~ .cat {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    /* Letter content */
    .letter h1 {
      font-family: 'Caveat', cursive;
      font-size: 32px;
      color: #5A189A;
      margin-bottom: 4px;
    }

    .letter p {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      color: #333;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .letter video {
      width: 100%;
      border-radius: 8px;
      border: 2px solid #E0AAFF;
      margin: 8px 0 12px;
      display: block;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      margin-bottom: 6px;
      padding: 12px 28px;
      border: none;
      border-radius: 25px;
      background: #7B2CBF;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(123,44,191,0.35);
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .btn:active {
      background: #5A189A;
      transform: scale(0.97);
    }

    @media (max-width: 768px) {
      body { padding: 60px 12px 30px; }
      .scene { max-width: 100%; padding-top: 50px; }
      .envelope { height: 170px; }
      .letter { max-height: 150px; padding: 18px 16px 16px; }
      .letter h1 { font-size: 26px; }
      .letter p { font-size: 19px; }
      .letter video { max-height: 200px; }
      .cat { font-size: 42px; }
    }

    @media (max-width: 480px) {
      body { padding: 50px 10px 20px; }
      .scene { max-width: 100%; padding-top: 45px; }
      .envelope { height: 160px; }
      .letter { max-height: 140px; padding: 16px 14px 14px; }
      .letter h1 { font-size: 24px; }
      .letter p { font-size: 18px; }
      .letter video { max-height: 180px; }
      .btn { font-size: 14px; padding: 10px 24px; }
      .cat { font-size: 38px; }
    }
  </style>
</head>
<body>

<script>
  const icons = ["💜","✨","💖","🐾","🐈‍⬛"];
  for (let i = 0; i < 22; i++) {
    const el = document.createElement("div");
    el.className = "floating-item";
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.cssText = `left:${Math.random()*100}vw;font-size:${12+Math.random()*14}px;animation-duration:${5+Math.random()*7}s;animation-delay:${Math.random()*5}s;`;
    document.body.appendChild(el);
  }
</script>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="seal">🐾</div>
    <div class="letter">
      <h1>Hey Kaitlynn 💜</h1>
      <p>I wanted to make you a little world...</p>
      <p style="color:#5A189A;font-weight:bold;font-size:19px;margin-top:2px;">Watch this first 🎬</p>
      <video controls playsinline>
        <source src="Images/IMG_0544.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <p>...just to remind you how much you mean to me.</p>
      <button class="btn" onclick="enterSite(event)">Open Dashboard 🎀</button>
    </div>
    <div class="pocket"></div>
  </div>

  <div class="cat">🐈‍⬛</div>
</div>

<script>
  function openEnvelope() {
    const env = document.getElementById("env");
    if (env.classList.contains("is-open")) return;
    env.classList.add("is-open");
    env.onclick = null;
  }
  function enterSite(e) {
    e.stopPropagation();
    window.location.href = "dashboard.html";
  }
</script>

</body>
</html>
